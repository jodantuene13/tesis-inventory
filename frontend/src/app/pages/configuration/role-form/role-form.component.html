<div class="container mx-auto p-4 max-w-4xl">
    <h2 class="text-2xl font-bold mb-4">{{ isEditMode ? 'Editar Rol' : 'Crear Nuevo Rol' }}</h2>
    <form (ngSubmit)="onSubmit()" #roleForm="ngForm" class="bg-white shadow-md rounded px-8 pt-6 pb-8 mb-4">

        <!-- Datos Básicos -->
        <div class="mb-6">
            <h3 class="text-xl font-semibold mb-4 border-b pb-2">Datos Generales</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="nombreRol">
                        Nombre del Rol
                    </label>
                    <input [(ngModel)]="role.nombreRol" name="nombreRol" id="nombreRol" type="text" required
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline">
                </div>
                <div>
                    <label class="block text-gray-700 text-sm font-bold mb-2" for="descripcion">
                        Descripción
                    </label>
                    <textarea [(ngModel)]="role.descripcion" name="descripcion" id="descripcion" rows="3"
                        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"></textarea>
                </div>
            </div>
        </div>

        <!-- Árbol de Permisos -->
        <div class="mt-2">
            <h3 class="text-xl font-semibold mb-4 border-b pb-2">Permisos del Sistema</h3>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div *ngFor="let modulo of objectKeys(permisosPorModulo)" class="bg-gray-50 p-4 rounded border">
                    <h4 class="font-bold text-blue-800 mb-3 uppercase text-sm">{{ modulo }}</h4>
                    <div *ngFor="let permiso of permisosPorModulo[modulo]" class="mb-2">
                        <label class="inline-flex items-start">
                            <input type="checkbox" [checked]="hasPermiso(permiso.idPermiso)"
                                (change)="togglePermiso(permiso.idPermiso, $event)" class="form-checkbox h-4 w-4 mt-1 text-blue-600">
                            <div class="ml-2">
                                <span class="block text-sm font-medium text-gray-800">{{ permiso.nombre }}</span>
                                <span class="block text-xs text-gray-500">{{ permiso.descripcion }}</span>
                            </div>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex items-center justify-end mt-8 border-t pt-4 space-x-4">
            <a routerLink="/configuration/roles"
                class="font-bold text-sm text-gray-600 hover:text-gray-800 transition">
                Cancelar
            </a>
            <button type="submit" [disabled]="!roleForm.form.valid"
                class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded shadow transition focus:outline-none">
                {{ isEditMode ? 'Guardar Cambios' : 'Crear Rol' }}
            </button>
        </div>
    </form>
</div>
