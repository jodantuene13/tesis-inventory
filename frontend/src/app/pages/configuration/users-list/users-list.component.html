<div class="container mx-auto p-4">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
        <h2 class="text-2xl font-bold text-gray-800">Gestión de Usuarios</h2>
        <a routerLink="/configuration/users/new"
            class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow transition">
            <span class="flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                    <path fill-rule="evenodd"
                        d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z"
                        clip-rule="evenodd" />
                </svg>
                Nuevo Usuario
            </span>
        </a>
    </div>

    <!-- Filters -->
    <div class="bg-white p-4 rounded-lg shadow mb-6 flex flex-wrap gap-4 items-end">
        <div class="flex-1 min-w-[200px]">
            <label class="block text-sm font-medium text-gray-700 mb-1">Buscar</label>
            <input type="text" [(ngModel)]="searchTerm" (keyup.enter)="search()" placeholder="Nombre o Email..."
                class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2 border">
        </div>

        <div class="w-full md:w-auto">
            <label class="block text-sm font-medium text-gray-700 mb-1">Rol</label>
            <select [(ngModel)]="selectedRoleId" (change)="search()"
                class="w-full md:w-48 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2 border">
                <option [ngValue]="null">Todos los Roles</option>
                <option *ngFor="let role of roles" [ngValue]="role.idRol">{{ role.nombreRol }}</option>
            </select>
        </div>

        <div class="w-full md:w-auto">
            <label class="block text-sm font-medium text-gray-700 mb-1">Sede</label>
            <select [(ngModel)]="selectedSedeId" (change)="search()"
                class="w-full md:w-48 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2 border">
                <option [ngValue]="null">Todas las Sedes</option>
                <option *ngFor="let sede of sedes" [ngValue]="sede.idSede">{{ sede.nombreSede }}</option>
            </select>
        </div>

        <div class="w-full md:w-auto">
            <label class="block text-sm font-medium text-gray-700 mb-1">Estado</label>
            <select [(ngModel)]="selectedStatus" (change)="search()"
                class="w-full md:w-32 rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 text-sm p-2 border">
                <option value="">Todos</option>
                <option value="true">Activo</option>
                <option value="false">Inactivo</option>
            </select>
        </div>

        <div class="flex gap-2">
            <button (click)="search()"
                class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700 transition flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                Buscar
            </button>
            <button *ngIf="hasSearched" (click)="clearFilters()"
                class="text-gray-600 hover:text-gray-800 px-3 py-2 rounded border border-gray-300 hover:bg-gray-50 transition">
                Limpiar
            </button>
        </div>
    </div>

    <div class="overflow-x-auto">
        <table class="min-w-full bg-white border border-gray-300">
            <thead>
                <tr class="bg-gray-100 text-gray-600 uppercase text-sm leading-normal">
                    <th class="py-3 px-6 text-left">Nombre</th>
                    <th class="py-3 px-6 text-left">Email</th>
                    <th class="py-3 px-6 text-left">Rol</th>
                    <th class="py-3 px-6 text-left">Sede</th>
                    <th class="py-3 px-6 text-center">Estado</th>
                    <th class="py-3 px-6 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="text-gray-600 text-sm font-light">
                <tr *ngFor="let user of users" class="border-b border-gray-200 hover:bg-gray-100">
                    <td class="py-3 px-6 text-left whitespace-nowrap font-medium">{{ user.nombreUsuario }}</td>
                    <td class="py-3 px-6 text-left">{{ user.email }}</td>
                    <td class="py-3 px-6 text-left">{{ user.nombreRol }}</td>
                    <td class="py-3 px-6 text-left">{{ user.nombreSede }}</td>
                    <td class="py-3 px-6 text-center">
                        <span (click)="toggleStatus(user)"
                            class="cursor-pointer hover:shadow-lg transition duration-150 ease-in-out"
                            [class]="user.estado ? 'bg-green-100 text-green-800 py-1 px-3 rounded-full text-xs font-semibold' : 'bg-red-100 text-red-800 py-1 px-3 rounded-full text-xs font-semibold'"
                            title="Clic para cambiar estado">
                            {{ user.estado ? 'Activo' : 'Inactivo' }}
                        </span>
                    </td>
                    <td class="py-3 px-6 text-center">
                        <div class="flex item-center justify-center space-x-4">
                            <!-- Edit Button -->
                            <a [routerLink]="['/configuration/users/edit', user.idUsuario]"
                                class="transform hover:text-blue-500 hover:scale-110 transition duration-150 ease-in-out"
                                title="Editar">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                                </svg>
                            </a>

                            <!-- Delete Button -->
                            <button (click)="deleteUser(user.idUsuario)"
                                class="transform hover:text-red-500 hover:scale-110 transition duration-150 ease-in-out"
                                title="Eliminar">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
                                </svg>
                            </button>
                        </div>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
