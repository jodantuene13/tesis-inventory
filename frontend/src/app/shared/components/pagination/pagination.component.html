<div class="ds-table-footer">
    <!-- Resultados -->
    <span class="pagination-info">
        <ng-container *ngIf="totalCount > 0">
            Mostrando {{ from }}–{{ to }} de {{ totalCount }} resultados
        </ng-container>
        <ng-container *ngIf="totalCount === 0">Sin resultados</ng-container>
    </span>

    <!-- Controles -->
    <div class="pagination-controls">
        <!-- Selector de pageSize -->
        <div class="pagination-size">
            <select (change)="onPageSizeChange($event)" [value]="pageSize" class="pagination-size__select">
                <option *ngFor="let opt of pageSizeOptions" [value]="opt">{{ opt }} por pág.</option>
            </select>
        </div>

        <!-- Números de página -->
        <div class="pagination-pages">
            <!-- Anterior -->
            <button class="pg-btn" [class.pg-btn--disabled]="page === 1" (click)="goTo(page - 1)" [disabled]="page === 1" title="Anterior">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <!-- Páginas numeradas -->
            <ng-container *ngFor="let p of pages">
                <button *ngIf="isNumber(p)"
                    class="pg-btn" [class.pg-btn--active]="p === page"
                    (click)="goTo(p)">{{ p }}</button>
                <span *ngIf="!isNumber(p)" class="pg-ellipsis">…</span>
            </ng-container>

            <!-- Siguiente -->
            <button class="pg-btn" [class.pg-btn--disabled]="page === totalPages" (click)="goTo(page + 1)" [disabled]="page === totalPages" title="Siguiente">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                </svg>
            </button>
        </div>
    </div>
</div>
