<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 220" width="520" height="220">
  <defs>
    <linearGradient id="tGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4FF;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#7B5CF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B2EFF;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- T letter: horizontal bar (thick, rounded, stadium shape) -->
  <!-- Outer pill shape of horizontal bar -->
  <rect x="28" y="38" width="210" height="62" rx="31" ry="31" fill="url(#tGrad)" />
  <!-- Inner pill cutout (white hole inside horizontal bar) -->
  <rect x="54" y="58" width="158" height="22" rx="11" ry="11" fill="white" />

  <!-- Vertical stem of T (left side, going down from horizontal bar) -->
  <rect x="62" y="88" width="44" height="90" rx="14" ry="14" fill="url(#tGrad)" />

  <!-- Text "esis" -->
  <text x="252" y="136"
    font-family="'Montserrat', 'Arial Black', sans-serif"
    font-weight="800"
    font-size="88"
    fill="#0D0D3D"
    dominant-baseline="auto"
    letter-spacing="-2">esis</text>

  <!-- Text "Inventory" -->
  <text x="258" y="182"
    font-family="'Montserrat', 'Arial', sans-serif"
    font-weight="600"
    font-size="34"
    fill="#00AAEE"
    dominant-baseline="auto"
    letter-spacing="1">Inventory</text>
</svg>
